name: Build and publish container image

# Baut das Frontend-Image (frontend/Dockerfile) und veröffentlicht es auf
# GitHub Container Registry (ghcr.io) — kein zusätzliches Secret nötig, der
# eingebaute GITHUB_TOKEN reicht für ghcr.io innerhalb desselben Repos/Owners.
#
# Nach einem erfolgreichen Lauf ist das Image direkt nutzbar, z. B.:
#   docker pull ghcr.io/<owner>/<repo>:main
# In docker-compose.yml statt `build: ./frontend` dann:
#   image: ghcr.io/<owner>/<repo>:main

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Auf Pull Requests aus Forks steht kein Schreib-Token zur Verfügung —
        # dort wird nur gebaut (siehe push: false unten), nicht veröffentlicht.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
